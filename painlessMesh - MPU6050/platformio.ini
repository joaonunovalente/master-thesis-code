[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200


lib_deps = 
    painlessmesh/painlessMesh @ ^1.5.0
    ArduinoJson
    arduinoUnity
    TaskScheduler
    AsyncTCP
    adafruit/Adafruit MPU6050 @ ^2.0.3
    adafruit/Adafruit Unified Sensor @ ^1.1.4